<section class="py-5 bg-white">
  <div class="container">
    <div class="text-center mb-5">
      <h2 class="fw-bold">Featured Products & Services</h2>
      <p class="text-muted">Explore our top offerings, handpicked for you</p>
    </div>
    <div class="row g-4">
      <div class="col-md-4" *ngFor="let product of featuredProducts">
        <div class="card h-100 shadow-sm">
          <img [src]="product.image" class="card-img-top" [alt]="product.name" style="object-fit:cover; height:200px;">
          <div class="card-body">
            <h5 class="card-title">{{ product.name }}</h5>
            <p class="card-text text-muted">{{ product.description }}</p>
          </div>
          <div class="card-footer bg-transparent border-0">
            <span class="fw-bold text-primary fs-5">{{ product.price }}</span>
            <button class="btn btn-outline-primary float-end">Learn More</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
